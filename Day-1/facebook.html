

<!DOCTYPE html>
<html>
<head>
    <title>Facebook Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            
        }

        body{
            background-color:#f0f2f5;
        }

        section{
            width:100%;
            height:100vh;
            display:flex;
        }

        .left{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .left h1{
            color:#1877f2;
            font-size:50px;
        }

        .left p{
            font-size:25px;
            margin-top:10px;
        }

        .right{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:350px;
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        input{
            
            margin-top:15px;
            border:1px solid lightgray;
            border-radius:5px;
            font-size:16px;
        }

        .login{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:#1877f2;
            color:white;
          
            border-radius:5px;
            font-size:18px;
            
        }

       
        a{
            display:block;
            margin-top: 20px;
            margin-bottom: 20px;
            text-decoration:none;
            color:#1877f2;
        }

    

        button{
            background:#42b72a;
            color:white;
            padding:12px 10px;
            /* border:none; */
            border-radius:5px;
            font-size:16px;
        }
    </style>
</head>

<body>

<section>

    <div class="left">
        <h1>facebook</h1>
        <p>Facebook helps you connect and share with the people in your life.</p>
    </div>

    <div class="right">

        <div class="login-box">

            <form>

                <input type="text" placeholder="Email address or phone number">

                <input type="password" placeholder="Password">

                <button class="login">Log In</button>

                <a href="#">Forgot Password?</a>

                <hr>

                <button>Create New Account</button>

            </form>

        </div>

    </div>

</section>

</body>
</html>

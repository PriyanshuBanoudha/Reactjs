<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            
        }body{
            background: rgb(220, 180, 180);
        }
       

        form{
            width: 300px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            
        }

        input, textarea{
            width: 100%;
            margin: 8px;
            padding: 8px;
        }

        button{
            width: 100px;
            padding: 8px;
            background: rgb(90, 218, 116);
            color: white;
            border: none;
        }
        div{
            margin-right: 30%;
            /* border-radius : 50%; */
        }
    </style>
</head>

<body>

<form>
    <div>
    <h2>Registration Form</h2>

    <input type="text" placeholder="Full Name">

    <input type="email" placeholder="Email">

    <input type="number" placeholder="Mobile Number">

    <textarea placeholder="Address" rows="3"></textarea>
    <input type="date" placeholder="dd-mm-yyyy">

    <button>Register</button>
    </div>
</form>

</body>
</html>
